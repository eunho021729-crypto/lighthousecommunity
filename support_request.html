<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마을의 필요 제보하기 - 등대마을공동체</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">💡 등대마을공동체</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#village-space">마을 공간</a></li>
                <li><a href="index.html#community-goods">마을 굿즈</a></li>
                <li><a href="index.html#project-funding">프로젝트 펀딩</a></li>
                <li><a href="index.html#reviews">나눔 후기</a></li>
                <li><a href="login.html" class="btn-login">로그인</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="section-header">
            <h2>✍️ 마을의 필요 제보하기</h2>
        </div>

        <div class="form-container">
            <p class="form-intro">마을을 더 좋게 만들 아이디어가 있나요? 도움이 필요한 곳, 개선하고 싶은 점 등 어떤 것이든 자유롭게 제안해주세요. 소중한 의견은 검토 후 프로젝트 펀딩으로 연결될 수 있습니다.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="proposal-title">제안 제목</label>
                    <input type="text" id="proposal-title" name="proposal-title" required>
                </div>
                <div class="form-group">
                    <label for="proposal-details">상세 내용</label>
                    <textarea id="proposal-details" name="proposal-details" rows="10" required></textarea>
                </div>
                 <div class="form-group">
                    <label for="proposer-name">제안자 이름 (선택)</label>
                    <input type="text" id="proposer-name" name="proposer-name">
                </div>
                <div class="form-group">
                    <label for="proposer-contact">연락처 (선택)</label>
                    <input type="text" id="proposer-contact" name="proposer-contact" placeholder="이메일 또는 전화번호">
                </div>
                <div style="text-align: center;">
                    <button type="submit" class="btn-primary">아이디어 제출하기</button>
                </div>
            </form>
        </div>

    </main>

    <footer>
        <p>© 2024 등대마을공동체. All rights reserved.</p>
    </footer>
</body>
</html>
