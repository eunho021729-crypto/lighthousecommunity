<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동체 후기 - 등대마을공동체</title>
    <link rel="stylesheet" href="style.v2.css">
    <link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">💡 등대마을공동체</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#village-space">마을 공간</a></li>
                <li><a href="index.html#community-goods">마을 굿즈</a></li>
                <li><a href="index.html#project-funding">프로젝트 펀딩</a></li>
                <li><a href="reviews.html">공동체 후기</a></li>
                <li><a href="login.html" class="btn-login">로그인</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="review-form-section">
            <div class="section-header">
                <h2>후기 남기기</h2>
            </div>
            <form id="review-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="rating">평점</label>
                    <select id="rating" name="rating" required>
                        <option value="5">★★★★★</option>
                        <option value="4">★★★★☆</option>
                        <option value="3">★★★☆☆</option>
                        <option value="2">★★☆☆☆</option>
                        <option value="1">★☆☆☆☆</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comment">후기</label>
                    <textarea id="comment" name="comment" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-primary">후기 남기기</button>
            </form>
        </section>

        <section id="reviews-section">
            <div class="section-header">
                <h2>전체 후기</h2>
            </div>
            <div id="reviews-container"></div>
        </section>
    </main>

    <footer>
        <p>© 2024 등대마을공동체. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
    <script src="main.js"></script>
</body>
</html>
