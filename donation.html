<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 후원하기 - 등대마을공동체</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">💡 등대마을공동체</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#village-space">마을 공간</a></li>
                <li><a href="index.html#community-goods">마을 굿즈</a></li>
                <li><a href="index.html#project-funding">프로젝트 펀딩</a></li>
                <li><a href="index.html#reviews">나눔 후기</a></li>
                <li><a href="login.html" class="btn-login">로그인</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="donation-form-section">
            <div class="section-header">
                <h2>프로젝트 후원하기</h2>
            </div>
            <form id="donation-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="amount">후원금액</label>
                    <input type="number" id="amount" name="amount" required>
                </div>
                <div class="form-group">
                    <label for="message">응원 메시지</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                <button type="submit" class="btn-primary">후원하기</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2024 등대마을공동체. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
    <script src="main.js"></script>
</body>
</html>
